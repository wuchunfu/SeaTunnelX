agent:
  id: "e2e-real-agent"

control_plane:
  addresses:
    - "127.0.0.1:19090"
  tls:
    enabled: false
  token: ""

heartbeat:
  interval: "3s"

log:
  level: "info"
  file: "tmp/e2e/installer-real/logs/seatunnelx-agent.log"
  max_size: 20
  max_backups: 2
  max_age: 7

seatunnel:
  install_dir: "tmp/e2e/installer-real/install/default"
