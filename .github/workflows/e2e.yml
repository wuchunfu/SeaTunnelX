name: E2E

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suites:
        description: E2E suites to run
        required: false
        default: all
        type: choice
        options:
          - all
          - smoke
          - installer-real
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect E2E Scope
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.scope.outputs.frontend }}
      backend: ${{ steps.scope.outputs.backend }}
      run_smoke: ${{ steps.scope.outputs.run_smoke }}
      run_installer_real: ${{ steps.scope.outputs.run_installer_real }}

    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend/backend changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-main.yml'
              - '.github/workflows/e2e.yml'
              - 'scripts/restart.sh'
            backend:
              - 'internal/**'
              - 'agent/**'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci-main.yml'
              - '.github/workflows/e2e.yml'
              - 'scripts/restart.sh'

      - name: Resolve E2E scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SUITES: ${{ github.event.inputs.suites || 'all' }}
          FILTER_FRONTEND: ${{ steps.filter.outputs.frontend }}
          FILTER_BACKEND: ${{ steps.filter.outputs.backend }}
        run: |
          frontend=false
          backend=false
          run_smoke=false
          run_installer_real=false

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            frontend="${FILTER_FRONTEND}"
            backend="${FILTER_BACKEND}"
            if [ "${frontend}" = "true" ]; then
              run_smoke=true
            fi
            if [ "${frontend}" = "true" ] || [ "${backend}" = "true" ]; then
              run_installer_real=true
            fi
          else
            frontend=true
            backend=true
            case "${INPUT_SUITES}" in
              smoke)
                run_smoke=true
                ;;
              installer-real)
                run_installer_real=true
                ;;
              *)
                run_smoke=true
                run_installer_real=true
                ;;
            esac
          fi

          echo "frontend=${frontend}" >> "$GITHUB_OUTPUT"
          echo "backend=${backend}" >> "$GITHUB_OUTPUT"
          echo "run_smoke=${run_smoke}" >> "$GITHUB_OUTPUT"
          echo "run_installer_real=${run_installer_real}" >> "$GITHUB_OUTPUT"

      - name: Print E2E scope
        run: |
          echo "frontend=${{ steps.scope.outputs.frontend }}"
          echo "backend=${{ steps.scope.outputs.backend }}"
          echo "run_smoke=${{ steps.scope.outputs.run_smoke }}"
          echo "run_installer_real=${{ steps.scope.outputs.run_installer_real }}"

  smoke-select:
    name: E2E Smoke Select
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_smoke == 'true'
    outputs:
      mode: ${{ steps.select-e2e.outputs.mode || steps.select-all.outputs.mode }}
      has_specs: ${{ steps.select-e2e.outputs.has_specs || steps.select-all.outputs.has_specs }}
      spec_count: ${{ steps.select-e2e.outputs.spec_count || steps.select-all.outputs.spec_count }}
      matched_groups: ${{ steps.select-e2e.outputs.matched_groups || steps.select-all.outputs.matched_groups }}
      spec_args: ${{ steps.select-e2e.outputs.spec_args || steps.select-all.outputs.spec_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Select incremental E2E specs for pull requests
        if: github.event_name == 'pull_request'
        id: select-e2e
        run: |
          node frontend/scripts/e2e/select-e2e-specs.mjs \
            --base "origin/${{ github.base_ref }}" \
            --head "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Select full smoke suite for scheduled/manual runs
        if: github.event_name != 'pull_request'
        id: select-all
        run: |
          node frontend/scripts/e2e/select-e2e-specs.mjs \
            --all \
            --github-output "$GITHUB_OUTPUT"

  smoke:
    name: E2E Smoke
    runs-on: ${{ matrix.runner }}
    needs: [changes, smoke-select]
    if: needs.changes.outputs.run_smoke == 'true' && needs.smoke-select.outputs.has_specs == 'true'
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          cd frontend
          pnpm exec playwright install --with-deps chromium

      - name: Print E2E execution plan
        run: |
          echo "runner=${{ matrix.runner }}"
          echo "arch=${{ matrix.arch }}"
          echo "mode=${{ needs.smoke-select.outputs.mode }}"
          echo "matched_groups=${{ needs.smoke-select.outputs.matched_groups }}"
          echo "spec_count=${{ needs.smoke-select.outputs.spec_count }}"
          echo "spec_args=${{ needs.smoke-select.outputs.spec_args }}"

      - name: Run selected E2E specs
        run: |
          cd frontend
          pnpm exec playwright test ${{ needs.smoke-select.outputs.spec_args }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.arch }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  installer-real:
    name: E2E Real Installer
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run_installer_real == 'true'
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          cd frontend
          pnpm exec playwright install --with-deps chromium

      - name: Run real installer E2E
        run: |
          cd frontend
          pnpm run test:e2e:installer-real

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-installer-real
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore

  gate:
    name: E2E Gate
    runs-on: ubuntu-latest
    needs: [changes, smoke-select, smoke, installer-real]
    if: always()

    steps:
      - name: Evaluate E2E gate
        run: |
          echo "run_smoke=${{ needs.changes.outputs.run_smoke }}"
          echo "has_specs=${{ needs.smoke-select.outputs.has_specs }}"
          echo "smoke_result=${{ needs.smoke.result }}"
          echo "run_installer_real=${{ needs.changes.outputs.run_installer_real }}"
          echo "installer_real_result=${{ needs.installer-real.result }}"

          if [ "${{ needs.changes.outputs.run_smoke }}" = "true" ] &&
             [ "${{ needs.smoke-select.outputs.has_specs }}" = "true" ] &&
             [ "${{ needs.smoke.result }}" != "success" ]; then
            echo "::error::E2E smoke matrix did not succeed."
            exit 1
          fi

          if [ "${{ needs.changes.outputs.run_installer_real }}" = "true" ] &&
             [ "${{ needs.installer-real.result }}" != "success" ]; then
            echo "::error::Real installer E2E did not succeed."
            exit 1
          fi

          echo "All required E2E suites succeeded."
