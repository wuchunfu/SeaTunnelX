name: CI on main

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  license-check:
    name: License Policy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Check license policy for pull request changes
        if: github.event_name == 'pull_request'
        run: python3 scripts/check_license.py --base-ref "origin/${{ github.base_ref }}" --head-ref "${{ github.sha }}"

      - name: Check license policy for push changes
        if: github.event_name == 'push'
        run: python3 scripts/check_license.py --base-ref "${{ github.event.before }}" --head-ref "${{ github.sha }}"

  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend/backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-main.yml'
              - 'scripts/restart.sh'
            backend:
              - 'internal/**'
              - 'agent/**'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci-main.yml'
              - 'scripts/restart.sh'

  backend-core-test:
    name: Backend Core Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run backend tests
        run: go test ./... -count=1

  agent-test:
    name: Agent Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run agent tests
        run: |
          cd agent
          go test ./... -count=1

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: |
          cd frontend
          pnpm run test -- --passWithNoTests

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Build standalone frontend
        run: |
          cd frontend
          pnpm run pack:standalone

  frontend-e2e-select:
    name: Frontend E2E Select
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    outputs:
      mode: ${{ steps.select-e2e.outputs.mode }}
      has_specs: ${{ steps.select-e2e.outputs.has_specs }}
      spec_count: ${{ steps.select-e2e.outputs.spec_count }}
      matched_groups: ${{ steps.select-e2e.outputs.matched_groups }}
      spec_args: ${{ steps.select-e2e.outputs.spec_args }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Resolve diff base
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Select incremental E2E specs
        id: select-e2e
        run: |
          node frontend/scripts/e2e/select-e2e-specs.mjs \
            --base "${{ steps.diff-base.outputs.value }}" \
            --head "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Print E2E selection
        run: |
          echo "mode=${{ steps.select-e2e.outputs.mode }}"
          echo "matched_groups=${{ steps.select-e2e.outputs.matched_groups }}"
          echo "spec_count=${{ steps.select-e2e.outputs.spec_count }}"
          echo "spec_args=${{ steps.select-e2e.outputs.spec_args }}"

  frontend-e2e-smoke:
    name: Frontend E2E Smoke
    runs-on: ${{ matrix.runner }}
    needs: [changes, frontend-e2e-select]
    if: needs.changes.outputs.frontend == 'true' && needs.frontend-e2e-select.outputs.has_specs == 'true'
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          cd frontend
          pnpm exec playwright install --with-deps chromium

      - name: Print E2E execution plan
        run: |
          echo "runner=${{ matrix.runner }}"
          echo "arch=${{ matrix.arch }}"
          echo "mode=${{ needs.frontend-e2e-select.outputs.mode }}"
          echo "matched_groups=${{ needs.frontend-e2e-select.outputs.matched_groups }}"
          echo "spec_count=${{ needs.frontend-e2e-select.outputs.spec_count }}"
          echo "spec_args=${{ needs.frontend-e2e-select.outputs.spec_args }}"

      - name: Run selected E2E specs
        run: |
          cd frontend
          pnpm exec playwright test ${{ needs.frontend-e2e-select.outputs.spec_args }}

      - name: Upload Playwright report
        if: !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.arch }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
