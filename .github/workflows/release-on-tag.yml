name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package-release:
    name: Package node22-${{ matrix.node_variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_variant: [official, glibc217]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release packages
        env:
          APP_VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --arch all \
            --bundle-observability both \
            --node-major 22 \
            --node-variant "${{ matrix.node_variant }}" \
            --build-frontend \
            --version "${APP_VERSION}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seatunnelx-packages-${{ github.ref_name }}-node22-${{ matrix.node_variant }}
          path: dist/releases/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: package-release

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: seatunnelx-packages-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: ls -alh release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-ghcr-images:
    name: Publish GHCR ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs: package-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: seatunnelx-backend
            dockerfile: .github/docker/Dockerfile.backend
          - image_name: seatunnelx-frontend
            dockerfile: .github/docker/Dockerfile.frontend
          - image_name: seatunnelx-all-in-one
            dockerfile: .github/docker/Dockerfile.all-in-one

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
